<!doctype html>
<head>
  <meta charset="utf8" />
  <title>Shoot'em</title>
  <link rel="stylesheet" href="index.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
</head>

<body>
  <header>
    <h1>Shoot'em</h1>
    <button id="startBtn">Start</button>
    <p>Made with <a href="https://threejs.org/">Three.js</a> and no AI</p>
  </header>

  <main>
    <section id="mainScreen">
      <canvas id="webglCanvas" class="in-run"></canvas>

      <div id="log" class="in-run"></div>

      <div id="topBar" class="partial-in-run">
        <button id="exitBtn" class="in-run">Exit</button>
        <div id="mainScreenWallet">
          <div><span class="value coin">0</span> 💰</div>
          <div><span class="value gem">0</span> 💎</div>
        </div>
        <button id="settingsBtn">⚙️</button>
      </div>

      <div id="touchToStart">touch to start</div>

      <div id="inRunWallet" class="only-in-run">
        <div><span class="value coin"></span> 💰</div>
        <div><span class="value gem"></span> 💎</div>
      </div>

      <div id="endRunScreen">
        <h2>Well done!</h2>
        <div><span class="value coin"></span> 💰</div>
        <div><span class="value gem"></span> 💎</div>
        <button class="ok">OK</button>
      </div>
    </section>
  </main>

  <script type="module" src="src/index.ts"></script>
</body>
