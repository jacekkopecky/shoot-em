<!doctype html>

<head>
  <meta charset="utf8" />
  <title>Shoot'em</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <script type="module" crossorigin src="/shoot-em/assets/index-BQlKBUGU.js"></script>
  <link rel="stylesheet" crossorigin href="/shoot-em/assets/index-C4d_gHt7.css">
<link rel="manifest" href="/shoot-em/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/shoot-em/registerSW.js"></script></head>

<body class="using-fullscreen">
  <header>
    <h1>Shoot'em <img src="/shoot-em/assets/explosion-BrJVmXi7.svg"></h1>
    <button id="startBtn">Start</button>
    <p>Made with <a href="https://threejs.org/">Three.js</a>.</p>
    <p>Works only on mobile for now.</p>
    <h4>Not really playable yet…</h4>
  </header>

  <main>
    <section id="mainScreen">
      <canvas id="webglCanvas" class="in-run"></canvas>

      <div id="log" class="in-run"></div>

      <div id="topBar" class="partial-in-run">
        <button id="exitBtn" class="in-run">Exit</button>
        <div id="mainScreenWallet">
          <div class="coin"><span class="value">0</span> <i class="i coins"></i></div>
          <div class="gem"><span class="value">0</span> <i class="i gem"></i></div>
        </div>
        <button id="settingsBtn">⚙️</button>
      </div>

      <div id="playStats">
        <div class="level">Level: <span class="value"></span></div>
        <div class="played">Played: <span class="value"></span></div>
      </div>

      <div id="touchToStart">touch to start</div>

      <div id="inRunWallet" class="only-in-run">
        <div class="coin"><span class="value"></span> <i class="i coins"></i></div>
        <div class="gem"><span class="value"></span> <i class="i gem"></i></div>
      </div>

      <div id="endRunScreen">
        <h2 class="if-win">Well done!</h2>
        <h2 class="if-not-win">Better luck next time!</h2>
        <div class="collected">Collected</div>
        <div class="coin hiddenGone"><span class="value"></span> <i class="i coins"></i></div>
        <div class="gem hiddenGone"><span class="value"></span> <i class="i gem"></i></div>
        <button class="ok">OK</button>
      </div>

      <div id="upgradeButtons">
        <div class="player">
          <span>Add player</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </div>
        <div class="rate">
          <span>Fire rate</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </div>
        <div class="damage">
          <span>Damage</span>
          <div class="level"><span class="value">0</span></div>
          <div class="cost"><span class="value">0</span> <i class="i coins"></i></div>
        </div>
      </div>
    </section>
  </main>

</body>
