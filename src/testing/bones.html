<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Three.js Bones Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #fps {
      font-size: 18px;
      font-family: sans-serif;
      position: fixed;
      top: 0.5em;
      left: 0.5em;
      pointer-events: none;

      &::after {
        content: 'fps';
      }
    }
  </style>
</head>

<body>
  <script type="module" src="./bones.ts">
  </script>
  <div id="fps"></div>
</body>

</html>
